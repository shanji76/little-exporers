  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 ─────────────────────────────────────────────── */\n:root {\n  --navy:       #1a2e44;\n  --navy-deep:  #122236;\n  --gold:       #c9a44a;\n  --gold-soft:  #d4b78f;\n  --cream:      #faf8f3;\n  --cream-deep: #f0ebe0;\n  --sage:       #5c715e;\n  --white:      #ffffff;\n  --gray-500:   #6c757d;\n  --gray-200:   #dde1e6;\n  --border:     rgba(0,0,0,0.08);\n  --shadow-sm:  0 2px 10px rgba(26,46,68,0.08);\n  --shadow-md:  0 4px 20px rgba(26,46,68,0.12);\n  --shadow-lg:  0 8px 32px rgba(26,46,68,0.16);\n  --radius-md:  12px;\n  --radius-lg:  20px;\n  --radius-pill:999px;\n  --font-display:'Cormorant Garamond', Georgia, serif;\n  --font-body:  'DM Sans', system-ui, sans-serif;\n  --dur:        0.22s;\n  --ease:       cubic-bezier(.4,0,.2,1);\n}\n\n/* ── Reset ──────────────────────────────────────────────── */\n*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }\nhtml { scroll-behavior: smooth; }\nbody {\n  font-family: var(--font-body);\n  background: var(--cream);\n  color: var(--navy);\n  -webkit-font-smoothing: antialiased;\n}\nimg { max-width: 100%; display: block; }\na { color: inherit; text-decoration: none; }\n\n/* ── Sticky header ──────────────────────────────────────── */\n.site-header {\n  position: sticky;\n  top: 0;\n  z-index: 100;\n  background: var(--white);\n  border-bottom: 1px solid var(--border);\n  box-shadow: var(--shadow-sm);\n}\n\n.header-inner {\n  max-width: 1200px;\n  margin: 0 auto;\n  padding: 0 48px;\n  height: 80px;\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n}\n\n.brand {\n  display: flex;\n  align-items: center;\n  gap: 14px;\n}\n\n.brand img {\n  height: 64px;\n  width: auto;\n}\n\n.brand-text {\n  display: flex;\n  flex-direction: column;\n}\n\n.brand-name {\n  font-family: var(--font-display);\n  font-size: 1.25rem;\n  font-weight: 500;\n  color: var(--navy);\n  letter-spacing: 0.01em;\n  line-height: 1.1;\n}\n\n.brand-tagline {\n  font-size: 0.68rem;\n  font-weight: 500;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--gold);\n  margin-top: 2px;\n}\n\n.header-cta {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  background: var(--navy);\n  color: var(--white);\n  font-family: var(--font-body);\n  font-size: 0.82rem;\n  font-weight: 700;\n  letter-spacing: 0.04em;\n  padding: 10px 22px;\n  border-radius: var(--radius-pill);\n  transition: background var(--dur) var(--ease), transform var(--dur) var(--ease);\n}\n\n.header-cta:hover {\n  background: var(--gold);\n  color: var(--navy);\n  transform: translateY(-1px);\n}\n\n/* ── Hero ───────────────────────────────────────────────── */\n.hero {\n  background: var(--navy);\n  color: var(--white);\n  text-align: center;\n  padding: 96px 48px 80px;\n  position: relative;\n  overflow: hidden;\n}\n\n.hero::before {\n  content: '';\n  position: absolute;\n  inset: 0;\n  background: radial-gradient(ellipse 80% 60% at 50% 100%, rgba(201,164,74,0.12) 0%, transparent 70%);\n  pointer-events: none;\n}\n\n.hero-eyebrow {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  background: rgba(201,164,74,0.15);\n  border: 1px solid rgba(201,164,74,0.3);\n  color: var(--gold);\n  font-size: 0.72rem;\n  font-weight: 700;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  padding: 6px 16px;\n  border-radius: var(--radius-pill);\n  margin-bottom: 28px;\n}\n\n.hero-eyebrow .dot {\n  width: 6px;\n  height: 6px;\n  border-radius: 50%;\n  background: var(--gold);\n  animation: pulse 2s ease-in-out infinite;\n}\n\n@keyframes pulse {\n  0%, 100% { opacity: 1; }\n  50% { opacity: 0.4; }\n}\n\n.hero h1 {\n  font-family: var(--font-display);\n  font-size: clamp(2.8rem, 5vw, 4.5rem);\n  font-weight: 300;\n  line-height: 1.1;\n  color: var(--white);\n  margin-bottom: 20px;\n  letter-spacing: -0.01em;\n}\n\n.hero h1 em {\n  font-style: italic;\n  color: var(--gold);\n}\n\n.hero-sub {\n  font-size: 1.05rem;\n  color: rgba(255,255,255,0.7);\n  max-width: 520px;\n  margin: 0 auto 48px;\n  line-height: 1.65;\n  font-weight: 300;\n}\n\n.hero-stats {\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  gap: 48px;\n  flex-wrap: wrap;\n}\n\n.hero-stat {\n  text-align: center;\n}\n\n.hero-stat-num {\n  font-family: var(--font-display);\n  font-size: 2rem;\n  font-weight: 400;\n  color: var(--gold);\n  line-height: 1;\n  display: block;\n}\n\n.hero-stat-label {\n  font-size: 0.72rem;\n  font-weight: 500;\n  letter-spacing: 0.1em;\n  text-transform: uppercase;\n  color: rgba(255,255,255,0.5);\n  margin-top: 4px;\n  display: block;\n  line-height: 1.4;\n}\n\n.hero-divider {\n  width: 1px;\n  height: 40px;\n  background: rgba(255,255,255,0.15);\n}\n\n/* ── Locations ──────────────────────────────────────────── */\n.locations {\n  padding: 80px 48px 96px;\n  max-width: 1200px;\n  margin: 0 auto;\n}\n\n.section-header {\n  text-align: center;\n  margin-bottom: 56px;\n}\n\n.section-eyebrow {\n  font-size: 0.7rem;\n  font-weight: 700;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--gold);\n  margin-bottom: 10px;\n}\n\n.section-title {\n  font-family: var(--font-display);\n  font-size: clamp(1.8rem, 3vw, 2.6rem);\n  font-weight: 300;\n  color: var(--navy);\n  line-height: 1.2;\n  margin-bottom: 12px;\n}\n\n.section-title em { font-style: italic; }\n\n.section-note {\n  font-size: 0.9rem;\n  color: var(--gray-500);\n  max-width: 480px;\n  margin: 0 auto;\n  line-height: 1.6;\n}\n\n.locations-grid {\n  display: grid;\n  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));\n  gap: 28px;\n}\n\n/* Location card — live */\n.loc-card {\n  background: var(--white);\n  border-radius: var(--radius-lg);\n  border: 1px solid var(--border);\n  overflow: hidden;\n  box-shadow: var(--shadow-sm);\n  transition: transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease);\n  display: flex;\n  flex-direction: column;\n}\n\n.loc-card:hover {\n  transform: translateY(-4px);\n  box-shadow: var(--shadow-lg);\n}\n\n.loc-card-banner {\n  height: 8px;\n  background: linear-gradient(90deg, var(--navy), var(--gold));\n}\n\n.loc-card-banner.coming-soon {\n  background: var(--gray-200);\n}\n\n.loc-card-body {\n  padding: 28px 28px 24px;\n  flex: 1;\n  display: flex;\n  flex-direction: column;\n}\n\n.loc-status {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  font-size: 0.68rem;\n  font-weight: 700;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  padding: 4px 10px;\n  border-radius: var(--radius-pill);\n  margin-bottom: 16px;\n  width: fit-content;\n}\n\n.loc-status.live {\n  background: #e8f5ee;\n  color: #1a6640;\n}\n\n.loc-status.live .status-dot {\n  width: 6px;\n  height: 6px;\n  border-radius: 50%;\n  background: #2a8a52;\n  animation: pulse 2s ease-in-out infinite;\n}\n\n.loc-status.soon {\n  background: #f0f4f8;\n  color: var(--gray-500);\n}\n\n.loc-name {\n  font-family: var(--font-display);\n  font-size: 1.6rem;\n  font-weight: 400;\n  color: var(--navy);\n  margin-bottom: 4px;\n  line-height: 1.1;\n}\n\n.loc-address {\n  font-size: 0.82rem;\n  color: var(--gray-500);\n  margin-bottom: 20px;\n  line-height: 1.5;\n}\n\n.loc-details {\n  display: flex;\n  flex-direction: column;\n  gap: 10px;\n  margin-bottom: 24px;\n  flex: 1;\n}\n\n.loc-detail {\n  display: flex;\n  align-items: flex-start;\n  gap: 10px;\n  font-size: 0.82rem;\n  color: var(--navy);\n}\n\n.loc-detail svg {\n  width: 16px;\n  height: 16px;\n  flex-shrink: 0;\n  color: var(--gold);\n  margin-top: 1px;\n}\n\n.loc-detail-text {\n  line-height: 1.4;\n}\n\n.loc-detail-label {\n  font-weight: 600;\n  display: block;\n  font-size: 0.72rem;\n  letter-spacing: 0.06em;\n  text-transform: uppercase;\n  color: var(--gray-500);\n  margin-bottom: 1px;\n}\n\n.loc-card-footer {\n  padding: 0 28px 28px;\n}\n\n.btn-loc {\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  gap: 8px;\n  width: 100%;\n  padding: 13px 24px;\n  border-radius: var(--radius-pill);\n  font-family: var(--font-body);\n  font-size: 0.85rem;\n  font-weight: 700;\n  letter-spacing: 0.04em;\n  transition: all var(--dur) var(--ease);\n  cursor: pointer;\n  border: none;\n}\n\n.btn-loc.primary {\n  background: var(--navy);\n  color: var(--white);\n}\n\n.btn-loc.primary:hover {\n  background: var(--gold);\n  color: var(--navy);\n}\n\n.btn-loc.secondary {\n  background: transparent;\n  color: var(--gray-500);\n  border: 1px solid var(--border);\n  cursor: default;\n}\n\n.btn-loc svg {\n  width: 16px;\n  height: 16px;\n}\n\n/* ── Programs strip ─────────────────────────────────────── */\n.programs {\n  background: var(--navy);\n  padding: 72px 48px;\n}\n\n.programs-inner {\n  max-width: 1200px;\n  margin: 0 auto;\n}\n\n.programs-header {\n  text-align: center;\n  margin-bottom: 48px;\n}\n\n.programs-header .section-eyebrow { color: var(--gold); }\n\n.programs-header .section-title {\n  color: var(--white);\n}\n\n.programs-grid {\n  display: grid;\n  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));\n  gap: 16px;\n}\n\n.prog-card {\n  background: rgba(255,255,255,0.06);\n  border: 1px solid rgba(255,255,255,0.1);\n  border-radius: var(--radius-md);\n  padding: 22px 20px;\n  text-align: center;\n  transition: background var(--dur) var(--ease);\n}\n\n.prog-card:hover {\n  background: rgba(255,255,255,0.1);\n}\n\n.prog-age {\n  font-size: 0.68rem;\n  font-weight: 700;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--gold);\n  margin-bottom: 8px;\n}\n\n.prog-name {\n  font-family: var(--font-display);\n  font-size: 1.2rem;\n  font-weight: 400;\n  color: var(--white);\n  margin-bottom: 8px;\n}\n\n.prog-desc {\n  font-size: 0.78rem;\n  color: rgba(255,255,255,0.55);\n  line-height: 1.5;\n}\n\n/* ── Promise ────────────────────────────────────────────── */\n.promise {\n  padding: 80px 48px;\n  max-width: 1200px;\n  margin: 0 auto;\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 80px;\n  align-items: center;\n}\n\n.promise-text h2 {\n  font-family: var(--font-display);\n  font-size: clamp(1.8rem, 2.5vw, 2.4rem);\n  font-weight: 300;\n  color: var(--navy);\n  line-height: 1.2;\n  margin-bottom: 20px;\n}\n\n.promise-text h2 em { font-style: italic; }\n\n.promise-text p {\n  font-size: 0.92rem;\n  color: var(--gray-500);\n  line-height: 1.7;\n  margin-bottom: 32px;\n}\n\n.promise-pillars {\n  display: flex;\n  flex-direction: column;\n  gap: 20px;\n}\n\n.pillar {\n  display: flex;\n  gap: 16px;\n  align-items: flex-start;\n}\n\n.pillar-icon {\n  width: 40px;\n  height: 40px;\n  border-radius: 10px;\n  background: var(--cream-deep);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  flex-shrink: 0;\n}\n\n.pillar-icon svg {\n  width: 20px;\n  height: 20px;\n  color: var(--gold);\n}\n\n.pillar-body h4 {\n  font-size: 0.88rem;\n  font-weight: 700;\n  color: var(--navy);\n  margin-bottom: 3px;\n}\n\n.pillar-body p {\n  font-size: 0.8rem;\n  color: var(--gray-500);\n  line-height: 1.5;\n  margin: 0;\n}\n\n.promise-visual {\n  background: var(--navy);\n  border-radius: var(--radius-lg);\n  padding: 48px 40px;\n  text-align: center;\n  position: relative;\n  overflow: hidden;\n}\n\n.promise-visual::before {\n  content: '';\n  position: absolute;\n  inset: 0;\n  background: radial-gradient(ellipse 80% 60% at 50% 100%, rgba(201,164,74,0.15) 0%, transparent 70%);\n}\n\n.promise-quote {\n  font-family: var(--font-display);\n  font-size: 1.5rem;\n  font-weight: 300;\n  font-style: italic;\n  color: var(--white);\n  line-height: 1.4;\n  margin-bottom: 20px;\n  position: relative;\n}\n\n.promise-attr {\n  font-size: 0.72rem;\n  font-weight: 600;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--gold);\n  position: relative;\n}\n\n.promise-crest {\n  width: 80px;\n  height: 80px;\n  margin: 0 auto 28px;\n  border-radius: 50%;\n  background: rgba(201,164,74,0.12);\n  border: 1px solid rgba(201,164,74,0.25);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  position: relative;\n}\n\n.promise-crest svg {\n  width: 40px;\n  height: 40px;\n  color: var(--gold);\n}\n\n/* ── Footer ─────────────────────────────────────────────── */\nfooter {\n  background: var(--navy-deep, #122236);\n  color: rgba(255,255,255,0.65);\n  padding: 56px 48px 32px;\n}\n\n.footer-inner {\n  max-width: 1200px;\n  margin: 0 auto;\n}\n\n.footer-top {\n  display: grid;\n  grid-template-columns: 1.5fr 1fr 1fr;\n  gap: 48px;\n  margin-bottom: 48px;\n  padding-bottom: 48px;\n  border-bottom: 1px solid rgba(255,255,255,0.08);\n}\n\n.footer-brand img {\n  height: 72px;\n  width: auto;\n  margin-bottom: 16px;\n  opacity: 0.9;\n}\n\n.footer-brand p {\n  font-size: 0.82rem;\n  line-height: 1.65;\n  max-width: 280px;\n}\n\n.footer-col h4 {\n  font-size: 0.68rem;\n  font-weight: 700;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--gold);\n  margin-bottom: 14px;\n}\n\n.footer-col ul {\n  list-style: none;\n  display: flex;\n  flex-direction: column;\n  gap: 8px;\n}\n\n.footer-col ul li {\n  font-size: 0.82rem;\n  line-height: 1.5;\n}\n\n.footer-col ul li a {\n  color: rgba(255,255,255,0.65);\n  transition: color var(--dur) var(--ease);\n}\n\n.footer-col ul li a:hover { color: var(--gold); }\n\n.footer-social {\n  display: flex;\n  gap: 10px;\n  margin-top: 16px;\n}\n.footer-social a {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  width: 36px;\n  height: 36px;\n  border-radius: 999px;\n  border: 1px solid rgba(255,255,255,0.2);\n  color: rgba(255,255,255,0.65);\n  transition: background var(--dur) var(--ease), border-color var(--dur) var(--ease), color var(--dur) var(--ease);\n}\n.footer-social a:hover {\n  background: rgba(255,255,255,0.1);\n  border-color: rgba(255,255,255,0.5);\n  color: var(--gold);\n}\n.footer-social svg { width: 18px; height: 18px; }\n\n.loc-social {\n  display: flex;\n  flex-direction: column;\n  gap: 8px;\n  margin-top: 12px;\n  padding-top: 12px;\n  border-top: 1px solid var(--border);\n}\n.loc-social a {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  color: var(--gray-500);\n  font-size: 0.82rem;\n  text-decoration: none;\n  transition: color var(--dur) var(--ease);\n}\n.loc-social a:hover { color: var(--gold); }\n.loc-social svg { width: 16px; height: 16px; flex-shrink: 0; }\n\n.footer-bottom {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  font-size: 0.75rem;\n  flex-wrap: wrap;\n  gap: 8px;\n}\n\n/* ── Responsive ─────────────────────────────────────────── */\n@media (max-width: 900px) {\n  .header-inner { padding: 0 24px; }\n  .hero { padding: 64px 24px 56px; }\n  .locations { padding: 56px 24px 64px; }\n  .programs { padding: 56px 24px; }\n  .promise { grid-template-columns: 1fr; gap: 40px; padding: 56px 24px; }\n  .promise-visual { display: none; }\n  footer { padding: 40px 24px 24px; }\n  .footer-top { grid-template-columns: 1fr 1fr; gap: 32px; }\n  .footer-brand { grid-column: 1 / -1; }\n}\n\n@media (max-width: 600px) {\n  .brand-text { display: none; }\n  .hero h1 { font-size: 2.4rem; }\n  .hero-stats { gap: 24px; }\n  .hero-divider { display: none; }\n  .footer-top { grid-template-columns: 1fr; }\n  .programs-grid { grid-template-columns: repeat(2, 1fr); }\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- ── HEADER ───────────────────────────────────────────── -->\n<header class=\"site-header\">\n  <div class=\"header-inner\">\n    <a class=\"brand\" href=\"/\">\n      <img src=\"6d53f5f0-7e0c-4267-a6a3-5a11669389fd\" alt=\"Woodbridge Academy\">\n      <div class=\"brand-text\">\n        <span class=\"brand-name\">Woodbridge Academy<\u002Fspan>\n        <span class=\"brand-tagline\">Where curiosity grows<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fa>\n    <a class=\"header-cta\" href=\"#locations\">\n      <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"rou
