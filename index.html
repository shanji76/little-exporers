  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';

      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');

    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }

    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.

      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.

            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +

      // ids) before wrapping — same escape level as every sibling JSON island.

        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';

      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.

        var hi = headOpen.index + headOpen[0].length;

      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).

      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.

          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();

        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);

      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

nd-tagline {\n  font-size: 0.68rem;\n  font-weight: 500;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--gold);\n  margin-top: 2px;\n}\n\n.header-cta {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  background: var(--navy);\n  color: var(--white);\n  font-family: var(--font-body);\n  font-size: 0.82rem;\n  font-weight: 700;\n  letter-spacing: 0.04em;\n  padding: 10px 22px;\n  border-radius: var(--radius-pill);\n  transition: background var(--dur) var(--ease), transform var(--dur) var(--ease);\n}\n\n.header-cta:hover {\n  background: var(--gold);\n  color: var(--navy);\n  transform: translateY(-1px);\n}\n\n/* ── Hero ───────────────────────────────────────────────── */\n.hero {\n  background: var(--navy);\n  color: var(--white);\n  text-align: center;\n  padding: 96px 48px 80px;\n  position: relative;\n  overflow: hidden;\n}\n\n.hero::before {\n  content: '';\n  position: absolute;\n  inset: 0;\n  background: radial-gradient(ellipse 80% 60% at 50% 100%, rgba(239,159,30,0.12) 0%, transparent 70%);\n  pointer-events: none;\n}\n\n.hero-eyebrow {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  background: rgba(239,159,30,0.15);\n  border: 1px solid rgba(239,159,30,0.3);\n  color: var(--gold);\n  font-size: 0.72rem;\n  font-weight: 700;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  padding: 6px 16px;\n  border-radius: var(--radius-pill);\n  margin-bottom: 28px;\n}\n\n.hero-eyebrow .dot {\n  width: 6px;\n  height: 6px;\n  border-radius: 50%;\n  background: var(--gold);\n  animation: pulse 2s ease-in-out infinite;\n}\n\n@keyframes pulse {\n  0%, 100% { opacity: 1; }\n  50% { opacity: 0.4; }\n}\n\n.hero h1 {\n  font-family: var(--font-display);\n  font-size: clamp(2.8rem, 5vw, 4.5rem);\n  font-weight: 300;\n  line-height: 1.1;\n  color: var(--white);\n  margin-bottom: 20px;\n  letter-spacing: -0.01em;\n}\n\n.hero h1 em {\n  font-style: italic;\n  color: var(--gold);\n}\n\n.hero-sub {\n  font-size: 1.05rem;\n  color: rgba(255,255,255,0.7);\n  max-width: 520px;\n  margin: 0 auto 48px;\n  line-height: 1.65;\n  font-weight: 300;\n}\n\n.hero-stats {\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  gap: 48px;\n  flex-wrap: wrap;\n}\n\n.hero-stat {\n  text-align: center;\n}\n\n.hero-stat-num {\n  font-family: var(--font-display);\n  font-size: 2rem;\n  font-weight: 400;\n  color: var(--gold);\n  line-height: 1;\n  display: block;\n}\n\n.hero-stat-label {\n  font-size: 0.72rem;\n  font-weight: 500;\n  letter-spacing: 0.1em;\n  text-transform: uppercase;\n  color: rgba(255,255,255,0.5);\n  margin-top: 4px;\n  display: block;\n  line-height: 1.4;\n}\n\n.hero-divider {\n  width: 1px;\n  height: 40px;\n  background: rgba(255,255,255,0.15);\n}\n\n/* ── Locations ──────────────────────────────────────────── */\n.locations {\n  padding: 80px 48px 96px;\n  max-width: 1200px;\n  margin: 0 auto;\n}\n\n.section-header {\n  text-align: center;\n  margin-bottom: 56px;\n}\n\n.section-eyebrow {\n  font-size: 0.7rem;\n  font-weight: 700;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--gold);\n  margin-bottom: 10px;\n}\n\n.section-title {\n  font-family: var(--font-display);\n  font-size: clamp(1.8rem, 3vw, 2.6rem);\n  font-weight: 300;\n  color: var(--navy);\n  line-height: 1.2;\n  margin-bottom: 12px;\n}\n\n.section-title em { font-style: italic; }\n\n.section-note {\n  font-size: 0.9rem;\n  color: var(--gray-500);\n  max-width: 480px;\n  margin: 0 auto;\n  line-height: 1.6;\n}\n\n.locations-grid {\n  display: grid;\n  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));\n  gap: 28px;\n}\n\n/* Location card — live */\n.loc-card {\n  background: var(--white);\n  border-radius: var(--radius-lg);\n  border: 1px solid var(--border);\n  overflow: hidden;\n  box-shadow: var(--shadow-sm);\n  transition: transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease);\n  display: flex;\n  flex-direction: column;\n}\n\n.loc-card:hover {\n  transform: translateY(-4px);\n  box-shadow: var(--shadow-lg);\n}\n\n.loc-card-banner {\n  height: 8px;\n  background: linear-gradient(90deg, var(--navy), var(--gold));\n}\n\n.loc-card-banner.coming-soon {\n  background: var(--gray-200);\n}\n\n.loc-card-body {\n  padding: 28px 28px 24px;\n  flex: 1;\n  display: flex;\n  flex-direction: column;\n}\n\n.loc-status {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  font-size: 0.68rem;\n  font-weight: 700;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  padding: 4px 10px;\n  border-radius: var(--radius-pill);\n  margin-bottom: 16px;\n  width: fit-content;\n}\n\n.loc-status.live {\n  background: #e8f5ee;\n  color: #1a6640;\n}\n\n.loc-status.live .status-dot {\n  width: 6px;\n  height: 6px;\n  border-radius: 50%;\n  background: #2a8a52;\n  animation: pulse 2s ease-in-out infinite;\n}\n\n.loc-status.soon {\n  background: #f0f4f8;\n  color: var(--gray-500);\n}\n\n.loc-name {\n  font-family: var(--font-display);\n  font-size: 1.6rem;\n  font-weight: 400;\n  color: var(--navy);\n  margin-bottom: 4px;\n  line-height: 1.1;\n}\n\n.loc-address {\n  font-size: 0.82rem;\n  color: var(--gray-500);\n  margin-bottom: 20px;\n  line-height: 1.5;\n}\n\n.loc-details {\n  display: flex;\n  flex-direction: column;\n  gap: 10px;\n  margin-bottom: 24px;\n  flex: 1;\n}\n\n.loc-detail {\n  display: flex;\n  align-items: flex-start;\n  gap: 10px;\n  font-size: 0.82rem;\n  color: var(--navy);\n}\n\n.loc-detail svg {\n  width: 16px;\n  height: 16px;\n  flex-shrink: 0;\n  color: var(--gold);\n  margin-top: 1px;\n}\n\n.loc-detail-text {\n  line-height: 1.4;\n}\n\n.loc-detail-label {\n  font-weight: 600;\n  display: block;\n  font-size: 0.72rem;\n  letter-spacing: 0.06em;\n  text-transform: uppercase;\n  color: var(--gray-500);\n  margin-bottom: 1px;\n}\n\n.loc-card-footer {\n  padding: 0 28px 28px;\n}\n\n.btn-loc {\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  gap: 8px;\n  width: 100%;\n  padding: 13px 24px;\n  border-radius: var(--radius-pill);\n  font-family: var(--font-body);\n  font-size: 0.85rem;\n  font-weight: 700;\n  letter-spacing: 0.04em;\n  transition: all var(--dur) var(--ease);\n  cursor: pointer;\n  border: none;\n}\n\n.btn-loc.primary {\n  background: var(--navy);\n  color: var(--white);\n}\n\n.btn-loc.primary:hover {\n  background: var(--gold);\n  color: var(--navy);\n}\n\n.btn-loc.secondary {\n  background: transparent;\n  color: var(--gray-500);\n  border: 1px solid var(--border);\n  cursor: default;\n}\n\n.btn-loc svg {\n  width: 16px;\n  height: 16px;\n}\n\n/* ── Programs strip ─────────────────────────────────────── */\n.programs {\n  background: var(--navy);\n  padding: 72px 48px;\n}\n\n.programs-inner {\n  max-width: 1200px;\n  margin: 0 auto;\n}\n\n.programs-header {\n  text-align: center;\n  margin-bottom: 48px;\n}\n\n.programs-header .section-eyebrow { color: var(--gold); }\n\n.programs-header .section-title {\n  color: var(--white);\n}\n\n.programs-grid {\n  display: grid;\n  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));\n  gap: 16px;\n}\n\n.prog-card {\n  background: rgba(255,255,255,0.06);\n  border: 1px solid rgba(255,255,255,0.1);\n  border-radius: var(--radius-md);\n  padding: 22px 20px;\n  text-align: center;\n  transition: background var(--dur) var(--ease);\n}\n\n.prog-card:hover {\n  background: rgba(255,255,255,0.1);\n}\n\n.prog-age {\n  font-size: 0.68rem;\n  font-weight: 700;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--gold);\n  margin-bottom: 8px;\n}\n\n.prog-name {\n  font-family: var(--font-display);\n  font-size: 1.2rem;\n  font-weight: 400;\n  color: var(--white);\n  margin-bottom: 8px;\n}\n\n.prog-desc {\n  font-size: 0.78rem;\n  color: rgba(255,255,255,0.55);\n  line-height: 1.5;\n}\n\n/* ── Promise ────────────────────────────────────────────── */\n.promise {\n  padding: 80px 48px;\n  max-width: 1200px;\n  margin: 0 auto;\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 80px;\n  align-items: center;\n}\n\n.promise-text h2 {\n  font-family: var(--font-display);\n  font-size: clamp(1.8rem, 2.5vw, 2.4rem);\n  font-weight: 300;\n  color: var(--navy);\n  line-height: 1.2;\n  margin-bottom: 20px;\n}\n\n.promise-text h2 em { font-style: italic; }\n\n.promise-text p {\n  font-size: 0.92rem;\n  color: var(--gray-500);\n  line-height: 1.7;\n  margin-bottom: 32px;\n}\n\n.promise-pillars {\n  display: flex;\n  flex-direction: column;\n  gap: 20px;\n}\n\n.pillar {\n  display: flex;\n  gap: 16px;\n  align-items: flex-start;\n}\n\n.pillar-icon {\n  width: 40px;\n  height: 40px;\n  border-radius: 10px;\n  background: var(--cream-deep);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  flex-shrink: 0;\n}\n\n.pillar-icon svg {\n  width: 20px;\n  height: 20px;\n  color: var(--gold);\n}\n\n.pillar-body h4 {\n  font-size: 0.88rem;\n  font-weight: 700;\n  color: var(--navy);\n  margin-bottom: 3px;\n}\n\n.pillar-body p {\n  font-size: 0.8rem;\n  color: var(--gray-500);\n  line-height: 1.5;\n  margin: 0;\n}\n\n.promise-visual {\n  background: var(--navy);\n  border-radius: var(--radius-lg);\n  padding: 48px 40px;\n  text-align: center;\n  position: relative;\n  overflow: hidden;\n}\n\n.promise-visual::before {\n  content: '';\n  position: absolute;\n  inset: 0;\n  background: radial-gradient(ellipse 80% 60% at 50% 100%, rgba(239,159,30,0.15) 0%, transparent 70%);\n}\n\n.promise-quote {\n  font-family: var(--font-display);\n  font-size: 1.5rem;\n  font-weight: 300;\n  font-style: italic;\n  color: var(--white);\n  line-height: 1.4;\n  margin-bottom: 20px;\n  position: relative;\n}\n\n.promise-attr {\n  font-size: 0.72rem;\n  font-weight: 600;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--gold);\n  position: relative;\n}\n\n.promise-crest {\n  width: 80px;\n  height: 80px;\n  margin: 0 auto 28px;\n  border-radius: 50%;\n  background: rgba(239,159,30,0.12);\n  border: 1px solid rgba(239,159,30,0.25);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  position: relative;\n}\n\n.promise-crest svg {\n  width: 40px;\n  height: 40px;\n  color: var(--gold);\n}\n\n/* ── Footer ─────────────────────────────────────────────── */\nfooter {\n  background: var(--navy-deep, #122236);\n  color: rgba(255,255,255,0.65);\n  padding: 56px 48px 32px;\n}\n\n.footer-inner {\n  max-width: 1200px;\n  margin: 0 auto;\n}\n\n.footer-top {\n  display: grid;\n  grid-template-columns: 1.5fr 1fr 1fr;\n  gap: 48px;\n  margin-bottom: 48px;\n  padding-bottom: 48px;\n  border-bottom: 1px solid rgba(255,255,255,0.08);\n}\n\n.footer-brand img {\n  height: 72px;\n  width: auto;\n  margin-bottom: 16px;\n  opacity: 0.9;\n}\n\n.footer-brand p {\n  font-size: 0.82rem;\n  line-height: 1.65;\n  max-width: 280px;\n}\n\n.footer-col h4 {\n  font-size: 0.68rem;\n  font-weight: 700;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--gold);\n  margin-bottom: 14px;\n}\n\n.footer-col ul {\n  list-style: none;\n  display: flex;\n  flex-direction: column;\n  gap: 8px;\n}\n\n.footer-col ul li {\n  font-size: 0.82rem;\n  line-height: 1.5;\n}\n\n.footer-col ul li a {\n  color: rgba(255,255,255,0.65);\n  transition: color var(--dur) var(--ease);\n}\n\n.footer-col ul li a:hover { color: var(--gold); }\n\n.footer-social {\n  display: flex;\n  gap: 10px;\n  margin-top: 16px;\n}\n.footer-social a {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  width: 36px;\n  height: 36px;\n  border-radius: 999px;\n  border: 1px solid rgba(255,255,255,0.2);\n  color: rgba(255,255,255,0.65);\n  transition: background var(--dur) var(--ease), border-color var(--dur) var(--ease), color var(--dur) var(--ease);\n}\n.footer-social a:hover {\n  background: rgba(255,255,255,0.1);\n  border-color: rgba(255,255,255,0.5);\n  color: var(--gold);\n}\n.footer-social svg { width: 18px; height: 18px; }\n\n.loc-social {\n  display: flex;\n  flex-direction: column;\n  gap: 8px;\n  margin-top: 12px;\n  padding-top: 12px;\n  border-top: 1px solid var(--border);\n}\n.loc-social a {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  color: var(--gray-500);\n  font-size: 0.82rem;\n  text-decoration: none;\n  transition: color var(--dur) var(--ease);\n}\n.loc-social a:hover { color: var(--gold); }\n.loc-social svg { width: 16px; height: 16px; flex-shrink: 0; }\n\n.footer-bottom {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  font-size: 0.75rem;\n  flex-wrap: wrap;\n  gap: 8px;\n}\n\n/* ── Responsive ─────────────────────────────────────────── */\n@media (max-width: 900px) {\n  .header-inner { padding: 0 24px; }\n  .hero { padding: 64px 24px 56px; }\n  .locations { padding: 56px 24px 64px; }\n  .programs { padding: 56px 24px; }\n  .promise { grid-template-columns: 1fr; gap: 40px; padding: 56px 24px; }\n  .promise-visual { display: none; }\n  footer { padding: 40px 24px 24px; }\n  .footer-top { grid-template-columns: 1fr 1fr; gap: 32px; }\n  .footer-brand { grid-column: 1 / -1; }\n}\n\n@media (max-width: 600px) {\n  .brand-text { display: none; }\n  .hero h1 { font-size: 2.4rem; }\n  .hero-stats { gap: 24px; }\n  .hero-divider { display: none; }\n  .footer-top { grid-template-columns: 1fr; }\n  .programs-grid { grid-template-columns: repeat(2, 1fr); }\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- ── HEADER ───────────────────────────────────────────── -->\n<header class=\"site-header\">\n  <div class=\"header-inner\">\n    <a class=\"brand\" href=\"/\">\n      <img src=\"a4f6db3d-2ef1-4422-8e7f-0f9a87fca21d\" alt=\"Little Explorers Learning Hub\">\n      <div class=\"brand-text\">\n        <span class=\"brand-name\">Little Explorers Learning Hub<\u002Fspan>\n        <span class=\"brand-tagline\">Where every child discovers their spark<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fa>\n    <a class=\"header-cta\" href=\"#locations\">\n      <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\
